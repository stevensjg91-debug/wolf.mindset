<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#09090b"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>WolfMindset</title>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"/>
<link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png"/>
<link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="WolfMindset"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/styles.css?v={{BUILD_VERSION}}"/>
<style>
  /* Estilos para el nuevo panel de plantillas */
  .plantilla-card {
    background: #18181b;
    border: 1px solid #27272a;
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .plantilla-info h4 { margin: 0; color: #fafafa; font-size: 15px; }
  .plantilla-info p { margin: 4px 0 0; color: #a1a1aa; font-size: 12px; }
  .badge-ia {
    background: rgba(74, 222, 128, 0.1);
    color: #4ade80;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
  }
</style>
</head>
<body>
<div id="root">

<div id="coach_cliente_entreno" class="screen">
  <div class="header-coach">
    <button onclick="verCliente(window._coachClienteActual.id)" class="back-btn">←</button>
    <h2 id="coach_rutina_titulo">Rutina</h2>
    <div style="display:flex; gap:10px;">
       <button onclick="abrirLibreriaPlantillas()" class="btn-icon" title="Cargar Plantilla">📚</button>
    </div>
  </div>

  <div class="content">
    <div id="coach_rutina_header" style="margin-bottom:20px;">
      <h3 id="coach_nombre_cliente_rutina" style="margin:0; font-family:'Bebas Neue'; letter-spacing:1px; font-size:24px;">-</h3>
      
      <div style="margin-top:10px; display:flex; gap:10px;">
        <button onclick="uiGuardarPlantilla()" style="background:none; border:1px solid #4ade80; color:#4ade80; padding:6px 12px; border-radius:8px; cursor:pointer; font-size:12px; display:flex; align-items:center; gap:5px;">
          <span>💾</span> Guardar como Plantilla Reusable
        </button>
      </div>
    </div>

    <div id="coach_dias_container"></div>
    
    <button class="btn-full" style="margin-top:20px;" onclick="rbNuevoDia()">+ Añadir nuevo día</button>
  </div>
</div>

<div id="panel_plantillas" class="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; align-items:center; justify-content:center;">
  <div style="background:#09090b; width:90%; max-width:500px; border-radius:20px; padding:20px; border:1px solid #27272a; max-height:80vh; overflow-y:auto;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <h3 style="margin:0; font-family:'Bebas Neue'; font-size:22px; color:#fff;">Mis Plantillas Reusables</h3>
      <button onclick="document.getElementById('panel_plantillas').style.display='none'" style="background:none; border:none; color:#a1a1aa; font-size:20px; cursor:pointer;">✕</button>
    </div>
    
    <div id="lista_plantillas_ia">
      </div>
  </div>
</div>

</div> <script src="/app1.js?v={{BUILD_VERSION}}"></script>
<script src="/app2.js?v={{BUILD_VERSION}}"></script>
</body>
</html>
