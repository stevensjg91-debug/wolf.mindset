<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#09090b"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<title>WolfMindset</title>
<link rel="manifest" href="/manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --b:#09090b;--s:#111113;--s2:#18181b;--s3:#1f1f23;
  --br:#27272a;--br2:#3f3f46;
  --sv:#e4e4e7;--sv2:#a1a1aa;--sv3:#52525b;
  --bl:#3b82f6;--bl2:#2563eb;--bl3:#1e3a5f;--blg:#93c5fd;
  --tx:#fafafa;--tx2:#a1a1aa;--tx3:#52525b;
  --gn:#22c55e;--gnd:rgba(34,197,94,0.1);--gnb:#86efac;
  --am:#f59e0b;--amd:rgba(245,158,11,0.1);--amb:#fcd34d;
  --rd:#ef4444;--rdd:rgba(239,68,68,0.1);
  --grad:linear-gradient(135deg,#1e3a5f 0%,#09090b 60%);
}
html,body{height:100%;background:var(--b);color:var(--tx);font-family:'Inter',sans-serif;overflow:hidden}
#root{height:100%;display:flex;flex-direction:column}

/* SCREENS */
.screen{display:none;flex-direction:column;height:100%}.screen.on{display:flex}

/* ═══ LOGIN ═══════════════════════════════════════════ */
.login-bg{
  flex-direction:column;align-items:center;justify-content:center;
  min-height:100%;padding:32px 20px;overflow-y:auto;
  background:radial-gradient(ellipse at 50% 0%,#1e3a5f 0%,#09090b 60%);
}
.login-logo{text-align:center;margin-bottom:36px;animation:fadeDown .6s ease}
.logo-svg-wrap{margin:0 auto 14px;width:90px;height:90px}
.login-brand{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.12em;color:var(--sv);line-height:1}
.login-sub{font-size:11px;color:var(--sv3);letter-spacing:.22em;text-transform:uppercase;margin-top:4px}
.login-card{
  background:rgba(17,17,19,.95);
  border:0.5px solid rgba(255,255,255,.08);
  border-radius:20px;padding:28px;width:100%;max-width:360px;
  backdrop-filter:blur(20px);
  box-shadow:0 24px 80px rgba(0,0,0,.6);
  animation:fadeUp .5s ease .1s both;
}
.ltabs{display:flex;gap:3px;background:var(--b);border-radius:10px;padding:3px;border:0.5px solid var(--br);margin-bottom:20px}
.ltab{flex:1;padding:9px;border:none;border-radius:8px;font-size:14px;cursor:pointer;background:none;color:var(--sv3);font-family:'Inter',sans-serif;transition:.2s}
.ltab.on{background:var(--bl2);color:#fff;font-weight:600}
.finp{width:100%;padding:12px 14px;border:0.5px solid var(--br);border-radius:10px;background:rgba(255,255,255,.04);color:var(--tx);font-size:15px;margin-bottom:10px;font-family:'Inter',sans-serif;transition:.2s}
.finp:focus{outline:none;border-color:var(--bl);background:rgba(59,130,246,.05)}
.finp option{background:var(--s)}
.fbtn{width:100%;padding:13px;background:var(--bl2);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:.15s;letter-spacing:.02em}
.fbtn:active{transform:scale(.98);background:var(--bl)}
.ferr{font-size:13px;color:#f87171;margin-bottom:10px;text-align:center}

/* ═══ APP SHELL ════════════════════════════════════════ */
.app-shell{flex:1;display:flex;overflow:hidden}

/* SIDEBAR (coach desktop) */
.sidebar{
  width:220px;min-width:220px;background:var(--s);
  border-right:0.5px solid var(--br);
  display:flex;flex-direction:column;
  transition:.3s;
}
.sb-top{padding:18px 16px;border-bottom:0.5px solid var(--br);display:flex;align-items:center;gap:10px}
.sb-logo-wrap{width:34px;height:34px;flex-shrink:0}
.sb-brand-text{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.1em;color:var(--sv)}
.sb-role-text{font-size:10px;color:var(--sv3);letter-spacing:.1em;text-transform:uppercase;margin-top:1px}
.snav{flex:1;padding:10px 8px;overflow-y:auto}
.sni{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:13px;color:var(--tx3);margin-bottom:2px;border:none;background:none;width:100%;text-align:left;font-family:'Inter',sans-serif;transition:.15s;font-weight:500}
.sni:hover{background:var(--s2);color:var(--sv2)}
.sni.on{background:rgba(37,99,235,.15);color:var(--blg);border:0.5px solid rgba(59,130,246,.2)}
.sni svg{width:16px;height:16px;flex-shrink:0}
.sb-out{margin:10px 8px;padding:10px 12px;border:none;background:none;color:var(--tx3);font-size:13px;cursor:pointer;text-align:left;border-radius:10px;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:8px}
.sb-out:hover{background:var(--s2);color:var(--sv2)}

/* MAIN AREA */
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{
  background:var(--s);border-bottom:0.5px solid var(--br);
  padding:12px 20px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-logo{width:28px;height:28px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:600;color:var(--sv)}
.topbar-right{font-size:12px;color:var(--tx3);font-weight:500}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:100px;position:relative}

/* BOTTOM NAV (mobile) */
.bnav-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  background:rgba(17,17,19,.98);
  border-top:0.5px solid var(--br);
  display:flex;padding:8px 0 max(10px,env(safe-area-inset-bottom));
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none;padding:4px;font-family:'Inter',sans-serif;transition:.15s}
.bni svg{width:22px;height:22px;color:var(--tx3);transition:.15s}
.bni.on svg{color:var(--bl)}
.bni-lbl{font-size:10px;color:var(--tx3);font-weight:500;letter-spacing:.03em;transition:.15s}
.bni.on .bni-lbl{color:var(--bl)}

/* ═══ COMPONENTS ════════════════════════════════════════ */
.sec{background:var(--s);border:0.5px solid var(--br);border-radius:14px;padding:16px;margin-bottom:14px}
.sec-hdr{font-size:11px;font-weight:600;color:var(--sv3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.sec-act{font-size:12px;color:var(--blg);cursor:pointer;background:none;border:none;font-family:'Inter',sans-serif;font-weight:500;text-transform:none;letter-spacing:0}
.g2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:14px}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.mcard{background:var(--s2);border:0.5px solid var(--br);border-radius:12px;padding:14px}
.mcard-lbl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;font-weight:600}
.mcard-val{font-size:22px;font-weight:700;color:var(--sv)}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;gap:4px}
.b-sv{background:rgba(228,228,231,.08);color:var(--sv2);border:0.5px solid var(--br2)}
.b-bl{background:rgba(37,99,235,.15);color:var(--blg);border:0.5px solid rgba(59,130,246,.25)}
.b-gn{background:var(--gnd);color:var(--gnb);border:0.5px solid rgba(34,197,94,.25)}
.b-am{background:var(--amd);color:var(--amb);border:0.5px solid rgba(245,158,11,.25)}
.b-rd{background:var(--rdd);color:#fca5a5;border:0.5px solid rgba(239,68,68,.25)}
.inp{width:100%;padding:11px 13px;border:0.5px solid var(--br);border-radius:10px;background:rgba(255,255,255,.03);color:var(--tx);font-size:14px;font-family:'Inter',sans-serif;transition:.2s}
.inp:focus{outline:none;border-color:var(--bl)}
.inp option{background:var(--s2)}
.ta{width:100%;padding:11px 13px;border:0.5px solid var(--br);border-radius:10px;background:rgba(255,255,255,.03);color:var(--tx);font-size:14px;font-family:'Inter',sans-serif;resize:vertical;min-height:80px;transition:.2s}
.ta:focus{outline:none;border-color:var(--bl)}
.btn{padding:10px 18px;background:var(--bl2);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:.15s}
.btn:active{transform:scale(.97)}
.btn-outline{background:none;border:0.5px solid var(--br2);color:var(--sv2)}
.btn-outline:active{background:var(--s2)}
.btn-danger{background:rgba(239,68,68,.15);color:#fca5a5;border:0.5px solid rgba(239,68,68,.3)}

/* CLIENT CARDS */
.cc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.cc{
  background:var(--s2);border:0.5px solid var(--br);border-radius:16px;
  padding:16px;cursor:pointer;transition:.2s;position:relative;overflow:hidden;
}
.cc::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(37,99,235,.05),transparent);opacity:0;transition:.2s}
.cc:hover{border-color:var(--bl);transform:translateY(-2px)}
.cc:hover::before{opacity:1}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;border:1.5px solid;flex-shrink:0;font-family:'Bebas Neue',sans-serif;letter-spacing:.05em}
.cc-name{font-size:14px;font-weight:600;color:var(--sv);margin-bottom:2px}
.cc-sub{font-size:11px;color:var(--tx3);margin-bottom:10px;font-weight:500}
.back-lnk{display:flex;align-items:center;gap:7px;margin-bottom:18px;cursor:pointer;color:var(--tx3);font-size:13px;font-weight:500}
.back-lnk:hover{color:var(--sv2)}

/* PROGRESS TABLE */
.ptable{width:100%;border-collapse:collapse}
.ptable th{text-align:left;padding:6px 10px;font-size:10px;font-weight:600;color:var(--tx3);border-bottom:0.5px solid var(--br);text-transform:uppercase;letter-spacing:.08em}
.ptable td{padding:10px 10px;border-bottom:0.5px solid var(--br);font-size:13px;color:var(--sv)}
.ptable tr:last-child td{border-bottom:none}

/* MACRO BARS */
.mb-row{display:flex;justify-content:space-between;font-size:12px;color:var(--tx3);margin-bottom:4px;font-weight:500}
.mb-row span:last-child{color:var(--sv2);font-weight:600}
.mb{height:4px;background:var(--s3);border-radius:2px;overflow:hidden;margin-bottom:10px}
.mb-fill{height:100%;border-radius:2px;transition:width .6s ease}

/* ═══ MOBILE ENTRENO ══════════════════════════════════ */
.hero-day{
  background:linear-gradient(135deg,#1e3a5f,#09090b);
  padding:24px 16px 20px;margin-bottom:0;
  position:relative;overflow:hidden;
}
.hero-day::after{content:'';position:absolute;right:-20px;top:-20px;width:120px;height:120px;background:radial-gradient(circle,rgba(59,130,246,.15),transparent);border-radius:50%}
.hero-day-label{font-size:11px;color:var(--blg);font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.hero-day-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.08em;color:var(--sv);line-height:1}
.hero-day-sub{font-size:13px;color:var(--sv3);margin-top:3px;font-weight:500}
.streak-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(245,158,11,.1);border:0.5px solid rgba(245,158,11,.3);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--amb);font-weight:600;margin-top:10px}

.day-scroll{display:flex;gap:8px;overflow-x:auto;padding:14px 16px;scrollbar-width:none;flex-shrink:0}
.day-scroll::-webkit-scrollbar{display:none}
.day-pill{
  flex-shrink:0;padding:8px 16px;border:0.5px solid var(--br);border-radius:20px;
  font-size:12px;color:var(--tx3);background:var(--s2);cursor:pointer;
  font-family:'Inter',sans-serif;text-align:center;line-height:1.3;font-weight:500;
  transition:.15s;white-space:nowrap;
}
.day-pill.on{background:var(--bl2);color:#fff;border-color:var(--bl2);font-weight:600}
.day-pill.done-pill{background:var(--gnd);color:var(--gnb);border-color:rgba(34,197,94,.3)}

/* EX CARD */
.ex-card{
  background:var(--s);border:0.5px solid var(--br);border-radius:16px;
  margin:0 16px 12px;overflow:hidden;transition:.2s;
}
.ex-card.done-ex{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.03)}
.ex-card.active-ex{border-color:var(--bl);box-shadow:0 0 0 1px rgba(59,130,246,.1)}
.ex-img-wrap{position:relative;height:160px;overflow:hidden;background:var(--s2);cursor:pointer}
.ex-img{width:100%;height:100%;object-fit:cover;transition:.3s}
.ex-img-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,rgba(0,0,0,.8));display:flex;align-items:flex-end;padding:12px}
.ex-img-badge{background:rgba(0,0,0,.6);backdrop-filter:blur(8px);border:0.5px solid rgba(255,255,255,.1);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--sv2);font-weight:500}
.ex-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;background:rgba(37,99,235,.8);border-radius:50%;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);transition:.2s}
.ex-play:hover{background:var(--bl2);transform:translate(-50%,-50%) scale(1.05)}
.ex-body{padding:14px}
.ex-hdr{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.ex-num{width:32px;height:32px;border-radius:50%;background:rgba(37,99,235,.15);color:var(--blg);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:0.5px solid rgba(59,130,246,.3)}
.ex-num.dn{background:var(--gnd);color:var(--gnb);border-color:rgba(34,197,94,.3)}
.ex-name{font-size:15px;font-weight:700;color:var(--sv);margin-bottom:2px}
.ex-muscle{font-size:11px;color:var(--tx3);font-weight:500}
.pr-banner{
  background:linear-gradient(90deg,rgba(245,158,11,.1),rgba(245,158,11,.05));
  border:0.5px solid rgba(245,158,11,.3);border-radius:8px;
  padding:8px 12px;margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
  font-size:12px;color:var(--amb);font-weight:600;
}

/* SERIES */
.series-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:12px}
.serie-box{
  background:var(--s2);border:0.5px solid var(--br);border-radius:12px;
  padding:11px 8px;text-align:center;cursor:pointer;position:relative;
  transition:.15s;user-select:none;
}
.serie-box:active{transform:scale(.96)}
.serie-box.done-s{background:var(--gnd);border-color:rgba(34,197,94,.35)}
.serie-box.active-s{border-color:var(--bl);background:rgba(37,99,235,.08)}
.s-lbl{font-size:10px;color:var(--tx3);font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em}
.s-reps{font-size:16px;font-weight:700;color:var(--sv)}
.s-kg{font-size:11px;color:var(--tx3);margin-top:2px;font-weight:500}
.s-check{position:absolute;top:5px;right:5px}

/* PESO CONTROL */
.peso-ctrl{
  display:flex;align-items:center;gap:10px;
  background:var(--s2);border:0.5px solid var(--br);border-radius:12px;
  padding:11px 14px;margin-bottom:12px;
}
.peso-lbl{font-size:13px;color:var(--tx2);flex:1;font-weight:500}
.peso-btns{display:flex;align-items:center;gap:10px}
.pbtn{
  width:36px;height:36px;border-radius:10px;border:0.5px solid var(--br2);
  background:var(--s);color:var(--sv);font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-family:'Inter',sans-serif;transition:.1s;user-select:none;
}
.pbtn:active{background:var(--bl3);transform:scale(.93)}
.peso-val{font-size:17px;font-weight:700;color:var(--blg);min-width:68px;text-align:center}

/* TIMER */
.timer-box{
  background:var(--s2);border:0.5px solid var(--br);border-radius:12px;
  padding:14px;margin-bottom:12px;
}
.timer-display{text-align:center;margin-bottom:12px}
.timer-time{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:.05em;color:var(--sv);line-height:1;transition:.3s}
.timer-time.urgent{color:#f87171}
.timer-lbl-t{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em;margin-top:2px;font-weight:600}
.tbar-wrap{height:4px;background:var(--s3);border-radius:2px;overflow:hidden;margin-bottom:12px}
.tbar-fill{height:100%;background:var(--bl);border-radius:2px;transition:width 1s linear}
.tbar-fill.urg{background:#ef4444}
.timer-btns{display:flex;gap:8px}
.tbtn{flex:1;padding:11px;border:0.5px solid var(--br2);border-radius:10px;background:var(--s);color:var(--sv2);font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;transition:.15s}
.tbtn.go{background:var(--bl2);color:#fff;border-color:var(--bl2)}
.tbtn:active{transform:scale(.97)}

/* REST OVERLAY */
.rest-ov{
  display:none;position:fixed;inset:0;
  background:rgba(9,9,11,.97);z-index:300;
  flex-direction:column;align-items:center;justify-content:center;
  padding:40px;backdrop-filter:blur(20px);
}
.rest-ov.show{display:flex;animation:fadeIn .2s ease}
.rest-icon{font-size:48px;margin-bottom:8px}
.rest-lbl{font-size:12px;color:var(--sv3);text-transform:uppercase;letter-spacing:.12em;font-weight:600;margin-bottom:6px}
.rest-time-big{font-family:'Bebas Neue',sans-serif;font-size:100px;letter-spacing:.02em;color:var(--sv);line-height:1;margin-bottom:4px;transition:.3s}
.rest-time-big.urg{color:#f87171}
.rest-sub{font-size:14px;color:var(--tx3);margin-bottom:28px;font-weight:500}
.rest-bar-w{width:100%;max-width:300px;height:5px;background:var(--br);border-radius:3px;overflow:hidden;margin-bottom:32px}
.rest-fill{height:100%;background:var(--bl);border-radius:3px;transition:width 1s linear}
.rest-fill.urg{background:#ef4444}
.rest-skip{padding:13px 36px;border:0.5px solid var(--br2);border-radius:12px;background:none;color:var(--sv2);font-size:15px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;transition:.15s}
.rest-skip:hover{background:var(--s2)}
.rest-next-ex{font-size:12px;color:var(--tx3);margin-top:16px;text-align:center;font-weight:500}

/* DONE OVERLAY */
.done-ov{
  display:none;position:fixed;inset:0;
  background:rgba(9,9,11,.97);z-index:300;
  flex-direction:column;align-items:center;justify-content:center;
  padding:40px;text-align:center;
}
.done-ov.show{display:flex;animation:fadeIn .3s ease}
.done-emoji{font-size:64px;margin-bottom:16px;animation:bounce .5s ease .2s both}
.done-title{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:.1em;color:var(--sv);margin-bottom:8px}
.done-sub{font-size:15px;color:var(--sv3);margin-bottom:32px;line-height:1.6;font-weight:500}
.done-stats{display:flex;gap:20px;margin-bottom:32px}
.done-stat{background:var(--s2);border:0.5px solid var(--br);border-radius:12px;padding:14px 20px;text-align:center}
.done-stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--sv)}
.done-stat-lbl{font-size:11px;color:var(--tx3);font-weight:600;margin-top:2px}

/* DIETA */
.meal-card{
  background:var(--s);border:0.5px solid var(--br);border-radius:16px;
  margin:0 16px 12px;overflow:hidden;
}
.meal-hdr{
  padding:14px 14px 12px;display:flex;align-items:center;gap:10px;
  border-bottom:0.5px solid var(--br);
}
.meal-icon{width:36px;height:36px;border-radius:10px;background:rgba(37,99,235,.1);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.meal-title{font-size:14px;font-weight:700;color:var(--sv)}
.meal-time{font-size:11px;color:var(--tx3);font-weight:500}
.meal-body{padding:4px 0}
.food-row{
  display:flex;align-items:center;gap:12px;
  padding:10px 14px;border-bottom:0.5px solid rgba(39,39,42,.5);
  cursor:pointer;transition:.15s;
}
.food-row:last-child{border-bottom:none}
.food-row:active{background:var(--s2)}
.food-img-wrap{width:44px;height:44px;border-radius:10px;overflow:hidden;background:var(--s2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px}
.food-img{width:100%;height:100%;object-fit:cover}
.food-info{flex:1;min-width:0}
.food-name{font-size:14px;font-weight:600;color:var(--sv);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.food-detail{font-size:11px;color:var(--tx3);font-weight:500;margin-top:1px}
.food-g{font-size:14px;font-weight:700;color:var(--blg)}
.food-unit{font-size:10px;color:var(--tx3);font-weight:500}

.libre-card{
  background:linear-gradient(135deg,rgba(245,158,11,.08),rgba(245,158,11,.03));
  border:0.5px solid rgba(245,158,11,.2);border-radius:16px;
  padding:16px;margin:0 16px 12px;display:flex;align-items:center;gap:12px;
}
.libre-icon{font-size:32px;flex-shrink:0}
.libre-title{font-size:12px;color:var(--amb);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.libre-msg{font-size:13px;color:var(--tx2);line-height:1.5;font-weight:500}

.adapt-box{
  margin:0 16px 12px;background:var(--s);
  border:0.5px solid rgba(59,130,246,.2);border-radius:16px;padding:16px;
}
.adapt-lbl{font-size:12px;color:var(--blg);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.adapt-result{margin-top:12px;background:rgba(37,99,235,.08);border:0.5px solid rgba(59,130,246,.2);border-radius:12px;padding:13px;font-size:14px;color:#bfdbfe;line-height:1.65;display:none;font-weight:500}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden}
.chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:16px;-webkit-overflow-scrolling:touch}
.msg{max-width:85%;padding:11px 14px;border-radius:16px;font-size:14px;line-height:1.55;font-weight:500;animation:fadeUp .2s ease}
.msg-u{background:var(--bl2);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg-b{background:var(--s2);color:var(--tx);align-self:flex-start;border:0.5px solid var(--br);border-bottom-left-radius:4px}
.msg-sender{font-size:10px;color:var(--sv3);margin-bottom:4px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.chat-input-wrap{
  display:flex;gap:9px;padding:12px 16px;
  border-top:0.5px solid var(--br);flex-shrink:0;
  background:var(--s);
}
.chat-inp{
  flex:1;padding:12px 14px;border:0.5px solid var(--br);border-radius:14px;
  background:var(--s2);color:var(--tx);font-size:15px;font-family:'Inter',sans-serif;
  transition:.2s;
}
.chat-inp:focus{outline:none;border-color:var(--bl)}
.chat-inp::placeholder{color:var(--tx3)}
.chat-send{
  width:46px;height:46px;border-radius:14px;background:var(--bl2);border:none;
  color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:.15s;
}
.chat-send:active{transform:scale(.93);background:var(--bl)}
.typing{display:none;font-size:12px;color:var(--tx3);padding:0 16px 6px;font-weight:500}

/* PROGRESO */
.stats-g{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;margin-bottom:14px}
.stat-card{background:var(--s);border:0.5px solid var(--br);border-radius:14px;padding:14px}
.stat-lbl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;font-weight:600}
.stat-val{font-size:22px;font-weight:700;color:var(--sv)}
.motiv-card{
  background:var(--s);border-left:3px solid var(--bl);
  border-radius:0 14px 14px 0;padding:16px;margin:0 16px 14px;
}
.motiv-text{font-size:14px;color:var(--sv2);line-height:1.7;font-weight:500}
.ph-upload{
  display:block;border:1.5px dashed var(--br2);border-radius:16px;
  padding:28px;text-align:center;cursor:pointer;margin:0 16px 12px;
  transition:.2s;
}
.ph-upload:hover{border-color:var(--bl);background:rgba(37,99,235,.04)}
.ia-result{background:rgba(37,99,235,.08);border:0.5px solid rgba(59,130,246,.25);border-radius:14px;padding:14px;margin:0 16px 12px}
.ia-result-title{font-size:10px;color:var(--blg);font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.ia-result-body{font-size:14px;color:#bfdbfe;line-height:1.65;font-weight:500}
.sec-lbl{font-size:11px;font-weight:700;color:var(--sv3);text-transform:uppercase;letter-spacing:.1em;padding:14px 16px 8px}

/* COACH FORM */
.form-row{margin-bottom:12px}
.form-lbl{font-size:12px;color:var(--tx3);font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* RESPONSIVE */
@media(min-width:768px){
  .sidebar{display:flex}
  .bnav-bar{display:none}
  .scroll{padding-bottom:20px}
  .coach-content{padding:20px}
  .ex-card{margin:0 0 12px}
  .meal-card{margin:0 0 12px}
  .day-scroll{padding:14px 0}
  .hero-day{padding:28px 20px}
  .stats-g{padding:0;grid-template-columns:repeat(4,1fr)}
  .motiv-card{margin:0 0 14px}
  .ph-upload{margin:0 0 12px}
  .ia-result{margin:0 0 12px}
  .sec-lbl{padding:14px 0 8px}
  .adapt-box{margin:0 0 12px}
  .libre-card{margin:0 0 12px}
}
@media(max-width:767px){.sidebar{display:none}}

.p16{padding:16px}
.pt8{padding-top:8px}
</style>

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on');}

function setLM(m,btn){document.querySelectorAll('.ltab').forEach(t=>t.classList.remove('on'));btn.classList.add('on');document.getElementById('csel').style.display=m==='cliente'?'block':'none';}

async function doLogin(){
  const u=document.getElementById('lu').value.trim(),p=document.getElementById('lp').value;
  const err=document.getElementById('lerr');err.style.display='none';
  try{
    const data=await api('/auth/login',{method:'POST',body:JSON.stringify({username:u,password:p})});
    TOKEN=data.token;USER=data.user;
    localStorage.setItem('wm_token',TOKEN);localStorage.setItem('wm_user',JSON.stringify(USER));
    if(USER.role==='coach'){
    show('sCoach');renderCoach('clientes');
    if(window.innerWidth<768){
      document.getElementById('coachMobileNav').style.display='flex';
      document.querySelector('#sCoach .scroll').style.paddingBottom='100px';
    }
  }
    else{show('sCliente');await loadCD(data.user.clienteId);klNav('entreno',document.getElementById('bni0'));}
  }catch(e){err.textContent=e.error||'Error al conectar';err.style.display='block';}
}
async function loadCD(id){CD=await api('/clientes/'+id);}
function doLogout(){TOKEN=null;USER=null;CD=null;localStorage.removeItem('wm_token');localStorage.removeItem('wm_user');show('sLogin');}

if(TOKEN&&USER){
  if(USER.role==='coach'){
    show('sCoach');renderCoach('clientes');
    if(window.innerWidth<768) document.getElementById('coachMobileNav').style.display='flex';
  }
  else{show('sCliente');api('/clientes/'+USER.clienteId).then(d=>{CD=d;klNav('entreno',document.getElementById('bni0'));}).catch(()=>doLogout());}
}

function cNavM(s,btn){
  document.querySelectorAll('#coachMobileNav .bni').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');

}

function cNav(s,btn){
  document.querySelectorAll('#sCoach .sni').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  const T={clientes:'Clientes',nuevo:'Nuevo cliente',rutinas:'Crear rutina','dieta-builder':'Crear dieta',progreso:'Progreso',ia:'Asistente IA Coach'};
  document.getElementById('cTitle').textContent=T[s];renderCoach(s);
}

async function renderCoach(s){
  const el=document.getElementById('cContent');
  if(s==='clientes'){const cl=await api('/clientes');el.innerHTML=hCClientes(cl);}
  else if(s==='nuevo'){el.innerHTML=hNuevo();}
  else if(s==='progreso'){const cl=await api('/clientes');el.innerHTML=hCProgreso(cl);}
  else if(s==='rutinas'){el.innerHTML=hRutinas();initRutinas();}
  else if(s==='dieta-builder'){el.innerHTML=hDietaBuilder();initDietaBuilder();}
  else if(s==='ia'){el.innerHTML=hIACoach();iaH=[{role:'assistant',content:'Hola coach, listo para ayudarte con progresión, periodización y ajuste de planes. ¿En qué trabajamos?'}];}
}

function hCClientes(cl){
  if(!cl.length)return`<div style="padding:40px;text-align:center;color:var(--tx3)"><div style="font-size:40px;margin-bottom:12px">👤</div><div style="font-size:15px;font-weight:600">Sin clientes aún</div><div style="font-size:13px;margin-top:6px">Crea el primero desde "Nuevo cliente"</div></div>`;
  const cards=cl.map((c,i)=>{const a=ac(i);return`<div class="cc" onclick="verCliente(${c.id})">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
      <div class="av" style="width:44px;height:44px;font-size:16px;background:${a.bg};color:${a.tx};border-color:${a.br}">${ini(c.nombre)}</div>
      <div><div class="cc-name">${c.nombre}</div><div class="cc-sub">${c.objetivo} · ${c.nivel}</div></div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <span class="badge b-sv">Sem ${c.semanas}</span>
      ${c.peso_actual?`<span class="badge b-bl">${c.peso_actual}kg</span>`:''}
      ${c.fotos_count>0?`<span class="badge b-am">${c.fotos_count} fotos</span>`:''}
    </div>
  </div>`;}).join('');
  return`<div class="g3" style="margin-bottom:16px">
    <div class="mcard"><div class="mcard-lbl">Clientes</div><div class="mcard-val">${cl.length}</div></div>
    <div class="mcard"><div class="mcard-lbl">Fotos</div><div class="mcard-val">${cl.reduce((a,c)=>a+(c.fotos_count||0),0)}</div></div>
    <div class="mcard"><div class="mcard-lbl">Estado</div><div class="mcard-val" style="font-size:14px;color:#86efac">Online</div></div>
  </div>
  <div class="sec"><div class="sec-hdr">Clientes activos</div><div class="cc-grid">${cards}</div></div>`;
}

async function guardarDatos(id){
  await api(`/clientes/${id}`,{method:'PUT',body:JSON.stringify({objetivo:document.getElementById('obj').value,nivel:document.getElementById('niv').value,kcal_internas:parseInt(document.getElementById('kcal').value),prot:parseInt(document.getElementById('prot').value),carbs:parseInt(document.getElementById('carbs').value),fat:parseInt(document.getElementById('fat').value),comida_libre:document.getElementById('clibre').value,mensaje_semana:document.getElementById('msgsem').value,notas_coach:document.getElementById('notasc').value})});
  const b=event.target;b.textContent='Guardado ✓';b.style.background='#166534';setTimeout(()=>{b.textContent='Guardar';b.style.background='';},2000);
}
async function addDia(cid){const n=prompt('Día (ej: Lunes):');if(!n)return;const g=prompt('Grupo muscular:');if(!g)return;await api(`/clientes/${cid}/dias`,{method:'POST',body:JSON.stringify({nombre:n,grupo:g})});verCliente(cid);}
async function addEjercicio(diaId,cid){const n=prompt('Ejercicio:');if(!n)return;const m=prompt('Músculos:')||'';const s=parseInt(prompt('Series:','3'));const r=prompt('Reps:','10-12');const p=parseFloat(prompt('Peso objetivo kg:','0'));const d=parseInt(prompt('Descanso segundos:','90'));await api(`/dias/${diaId}/ejercicios`,{method:'POST',body:JSON.stringify({nombre:n,musculos:m,series:s,reps:r,peso_objetivo:p,descanso:d})});verCliente(cid);}
async function editEx(id,cid){const p=parseFloat(prompt('Nuevo peso objetivo kg:')||'0');if(!p)return;await api(`/ejercicios/${id}`,{method:'PUT',body:JSON.stringify({peso_objetivo:p})});verCliente(cid);}
async function addComida(cid){const n=prompt('Nombre comida (ej: Desayuno):');if(!n)return;await api(`/clientes/${cid}/comidas`,{method:'POST',body:JSON.stringify({nombre:n})});verCliente(cid);}
async function addAlimento(comidaId,cid){const n=prompt('Alimento:');if(!n)return;const g=parseInt(prompt('Gramos en crudo:'));if(!g)return;await api(`/comidas/${comidaId}/alimentos`,{method:'POST',body:JSON.stringify({nombre:n,gramos:g})});verCliente(cid);}
async function editAlimento(id,cid){const g=parseInt(prompt('Nuevos gramos en crudo:'));if(!g)return;await api(`/alimentos/${id}`,{method:'PUT',body:JSON.stringify({gramos:g})});verCliente(cid);}

async function crearCliente(){
  const n=document.getElementById('nc_n').value.trim(),u=document.getElementById('nc_u').value.trim(),p=document.getElementById('nc_p').value;
  const msg=document.getElementById('nc_msg');
  if(!n||!u||!p){msg.style.color='#f87171';msg.textContent='Rellena todos los campos';return;}
  try{await api('/auth/register-cliente',{method:'POST',body:JSON.stringify({username:u,password:p,nombre:n,objetivo:document.getElementById('nc_o').value,nivel:document.getElementById('nc_nv').value})});msg.style.color='#86efac';msg.textContent=`✓ ${n} creado. Login: ${u}`;}
  catch(e){msg.style.color='#f87171';msg.textContent=e.error||'Error';}
}

async function sendIA(){
  const inp=document.getElementById('iaIn'),msg=inp.value.trim();if(!msg)return;inp.value='';
  const msgs=document.getElementById('iaMsgs');
  msgs.innerHTML+=`<div class="msg msg-u">${msg}</div>`;msgs.scrollTop=msgs.scrollHeight;
  iaH.push({role:'user',content:msg});document.getElementById('iaTyping').style.display='block';
  try{const d=await api('/ia/chat',{method:'POST',body:JSON.stringify({messages:iaH,system:'Eres el asistente IA privado del coach WolfMindset. Ayudas con progresión de carga, periodización, ajustes calóricos internos, estancamientos, volumen óptimo, deload. Respuestas técnicas y concisas. Máximo 4 frases.'})});
    iaH.push({role:'assistant',content:d.reply});document.getElementById('iaTyping').style.display='none';
    msgs.innerHTML+=`<div class="msg msg-b"><div class="msg-sender">WolfMindset IA</div>${d.reply}</div>`;msgs.scrollTop=msgs.scrollHeight;
  }catch(e){document.getElementById('iaTyping').style.display='none';msgs.innerHTML+=`<div class="msg msg-b"><div class="msg-sender">WolfMindset IA</div>Error. Inténtalo de nuevo.</div>`;}
}

function mb2(l,c,a,cal,tot){const p=Math.round((cal/tot)*100)||0;return`<div><div class="mb-row"><span>${l}</span><span>${a}g · ${p}%</span></div><div class="mb"><div class="mb-fill" style="width:${p}%;background:${c}"></div></div></div>`;}

function klNav(s,btn){
  klTab=s;
  document.querySelectorAll('.bni').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  renderKL();
}

function renderKL(){
  const el=document.getElementById('klContent');
  if(!CD){el.innerHTML='<div style="padding:40px;text-align:center;color:var(--tx3)">Cargando...</div>';return;}
  if(klTab==='entreno')el.innerHTML=hEntreno();
  else if(klTab==='dieta')el.innerHTML=hDieta();
  else if(klTab==='asistente'){el.innerHTML=hAsistente();chatH=[{role:'assistant',content:`Hola ${CD.nombre.split(' ')[0]}, aquí para ayudarte con dudas de entreno, dieta y recuperación. ¿Qué necesitas?`}];}
  else if(klTab==='progreso')el.innerHTML=hProgreso();
}

function hEntreno(){
  if(!CD.dias.length)return`<div style="padding:60px 20px;text-align:center;color:var(--tx3)"><div style="font-size:48px;margin-bottom:16px">🏋️</div><div style="font-size:16px;font-weight:600;color:var(--sv2)">Tu coach está preparando tu plan</div><div style="font-size:13px;margin-top:8px">Pronto tendrás tu entrenamiento aquí</div></div>`;
  const d=CD.dias[activeDia]||CD.dias[0];
  const pills=CD.dias.map((day,i)=>`<button class="day-pill ${i===activeDia?'on':''}" onclick="selDia(${i})">${day.nombre}</button>`).join('');
  const allDone=d.ejercicios.length>0&&d.ejercicios.every(e=>e._series&&e._series.every(s=>s.done));
  const totalSeries=d.ejercicios.reduce((a,e)=>a+e.series,0);
  const doneSeries=d.ejercicios.reduce((a,e)=>a+(e._series?e._series.filter(s=>s.done).length:0),0);
  const pct=totalSeries>0?Math.round((doneSeries/totalSeries)*100):0;

  const exCards=d.ejercicios.map((e,ei)=>{
    if(!e._series)e._series=Array.from({length:e.series},()=>({done:false,peso:e.peso_objetivo}));
    const exDone=e._series.every(s=>s.done);
    const imgUrl=exImg(e.nombre);
    const boxes=e._series.map((s,si)=>`<div class="serie-box ${s.done?'done-s':''}" onclick="toggleSerie(${ei},${si})">
      ${s.done?`<div class="s-check"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#86efac" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`:''}
      <div class="s-lbl">Serie ${si+1}</div>
      <div class="s-reps" style="${s.done?'color:var(--gnb)':''}">${e.reps}</div>
      ${e.peso_objetivo>0?`<div class="s-kg">${s.peso}kg</div>`:''}
    </div>`).join('');
    return`<div class="ex-card ${exDone?'done-ex':''}" id="ec_${ei}">
      ${imgUrl?`<div class="ex-img-wrap" onclick="toggleImgFull(${ei})">
        <img class="ex-img" src="${imgUrl}" loading="lazy" onerror="this.parentElement.style.display='none'"/>

function selDia(i){activeDia=i;document.getElementById('klContent').innerHTML=hEntreno();}

function toggleSerie(ei,si){
  const e=CD.dias[activeDia].ejercicios[ei];
  if(!e._series)e._series=Array.from({length:e.series},()=>({done:false,peso:e.peso_objetivo}));
  e._series[si].done=!e._series[si].done;
  if(e._series[si].done){
    const next=e._series[si+1];
    if(next&&!next.done)showRest(e.descanso,e.nombre,si+2,e.series);
    else if(!next){
      const nextEx=CD.dias[activeDia].ejercicios[ei+1];
      if(nextEx)showRest(e.descanso,nextEx.nombre,1,nextEx.series);
    }
  }
  const allDone=CD.dias[activeDia].ejercicios.every(ex=>ex._series&&ex._series.every(s=>s.done));
  if(allDone){setTimeout(()=>showDoneOverlay(),800);}
  document.getElementById('klContent').innerHTML=hEntreno();
}

function showDoneOverlay(){
  const d=CD.dias[activeDia];
  const total=d.ejercicios.reduce((a,e)=>a+e.series,0);
  document.getElementById('doneMsg').innerHTML=`${CD.nombre.split(' ')[0]}, has completado <strong>${d.nombre}</strong>.<br>El músculo se construye ahora que descansas.`;
  document.getElementById('doneStats').innerHTML=`<div class="done-stat"><div class="done-stat-val">${d.ejercicios.length}</div><div class="done-stat-lbl">Ejercicios</div></div><div class="done-stat"><div class="done-stat-val">${total}</div><div class="done-stat-lbl">Series</div></div>`;
  document.getElementById('doneOv').classList.add('show');
}

function ajPeso(ei,delta){
  const e=CD.dias[activeDia].ejercicios[ei];
  if(!e._series)e._series=Array.from({length:e.series},()=>({done:false,peso:e.peso_objetivo}));
  e._series.forEach(s=>s.peso=Math.max(0,parseFloat((s.peso+delta).toFixed(1))));
  const el=document.getElementById(`pv_${ei}`);
  if(el)el.textContent=e._series[0].peso+'kg';
}

function startTimer(ei,total){
  if(timerInts[ei])clearInterval(timerInts[ei]);
  let secs=total;
  timerInts[ei]=setInterval(()=>{
    secs--;
    const tEl=document.getElementById(`tt_${ei}`),bEl=document.getElementById(`tb_${ei}`);
    if(tEl){tEl.textContent=fmt(secs);tEl.className='timer-time'+(secs<=10?' urgent':'');}
    if(bEl){bEl.style.width=(secs/total*100)+'%';bEl.className='tbar-fill'+(secs<=10?' urg':'');}
    if(secs<=0){clearInterval(timerInts[ei]);delete timerInts[ei];if(tEl)tEl.textContent='¡Vamos!';}
  },1000);
}

function resetTimer(ei,total){
  if(timerInts[ei]){clearInterval(timerInts[ei]);delete timerInts[ei];}
  const tEl=document.getElementById(`tt_${ei}`),bEl=document.getElementById(`tb_${ei}`);
  if(tEl){tEl.textContent=fmt(total);tEl.className='timer-time';}
  if(bEl){bEl.style.width='100%';bEl.className='tbar-fill';}
}

function showRest(secs,exName,serieNum,totalSeries){
  restTotal=secs;restSecs=secs;
  document.getElementById('restTime').textContent=fmt(secs);
  document.getElementById('restTime').className='rest-time-big';
  document.getElementById('restSub').textContent='segundos hasta la siguiente serie';
  document.getElementById('restNext').textContent=`Siguiente → ${exName}`;
  document.getElementById('restFill').style.width='100%';
  document.getElementById('restFill').className='rest-fill';
  document.getElementById('restOv').classList.add('show');
  if(restInt)clearInterval(restInt);
  restInt=setInterval(()=>{
    restSecs--;
    const rt=document.getElementById('restTime'),rf=document.getElementById('restFill');
    if(rt){rt.textContent=fmt(restSecs);rt.className='rest-time-big'+(restSecs<=10?' urg':'');}
    if(rf){rf.style.width=(restSecs/restTotal*100)+'%';rf.className='rest-fill'+(restSecs<=10?' urg':'');}
    if(restSecs<=0){clearInterval(restInt);restInt=null;skipRest();}
  },1000);
}
function skipRest(){if(restInt){clearInterval(restInt);restInt=null;}document.getElementById('restOv').classList.remove('show');}

async function uploadFoto(event){
  const file=event.target.files[0];if(!file)return;
  document.getElementById('fLoad').style.display='block';document.getElementById('fAn').innerHTML='';
  const reader=new FileReader();
  reader.onload=async function(e){
    const b64=e.target.result,mt=b64.split(';')[0].split(':')[1],img=b64.split(',')[1];
    try{
      const d=await api('/ia/foto',{method:'POST',body:JSON.stringify({imageBase64:img,mediaType:mt,system:`Valoración de progreso WolfMindset. Analiza la foto (objetivo: ${CD.objetivo}, nivel: ${CD.nivel}, semana ${CD.semanas}). Directo, motivador. Sin mencionar tecnología. 4 frases: mejora visible, punto fuerte, motivación, recomendación concreta.`})});
      await api(`/clientes/${CD.id}/fotos`,{method:'POST',body:JSON.stringify({url:'foto_'+Date.now(),analysis:d.reply})});
      await loadCD(CD.id);
      document.getElementById('fLoad').style.display='none';
      document.getElementById('fAn').innerHTML=`<div class="ia-result"><div class="ia-result-title">Valoración de progreso</div><div class="ia-result-body">${d.reply}</div></div>`;
    }catch(err){document.getElementById('fLoad').style.display='none';document.getElementById('fAn').innerHTML=`<div class="ia-result"><div class="ia-result-body">Excelente actitud subiendo tu progreso. La constancia es la clave.</div></div>`;}
  };
  reader.readAsDataURL(file);
}

          <button class="sec-act" onclick="rbDelEx(${e.id},${d.id})" style="font-size:11px;color:#f87171">✕</button>
        </div>`).join('')}
    </div>`).join('') : '<div style="font-size:13px;color:var(--tx3)">Sin días. Añade el primero.</div>';
}

async function rbAddDia() {
  const n = prompt('Nombre del día (ej: Lunes):'); if (!n) return;
  const g = prompt('Grupo muscular (ej: Pecho + Tríceps):'); if (!g) return;
  await api('/clientes/' + rutinaState.clienteId + '/dias', { method:'POST', body: JSON.stringify({ nombre: n, grupo: g }) });
  await rbLoadDias();
}

function rbOpenEj(diaId, diaNombre) {
  rutinaState.diaId = diaId;
  document.getElementById('rb_ex_panel').style.display = 'block';
  document.getElementById('rb_dia_nombre').textContent = diaNombre;
  document.getElementById('rb_ex_panel').scrollIntoView({ behavior: 'smooth' });
  rbBuscarEj();
}

async function rbBuscarEj() {
  const grupo = document.getElementById('rb_grupo').value;
  const buscar = document.getElementById('rb_buscar').value;
  const params = new URLSearchParams();
  if (grupo !== 'Todos') params.append('grupo', grupo);
  if (buscar) params.append('buscar', buscar);
  const exs = await api('/ejercicios-db?' + params);
  const lista = document.getElementById('rb_ex_lista');
  lista.innerHTML = exs.map(e => `
    <div style="background:var(--s2);border:0.5px solid var(--br);border-radius:12px;padding:12px;cursor:pointer;transition:.15s" onmouseover="this.style.borderColor='var(--bl)'" onmouseout="this.style.borderColor='var(--br)'" onclick="rbAddEx(${e.id},'${e.nombre.replace(/'/g,"\\'")}','${e.musculos.replace(/'/g,"\\'")}')">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
        <span style="font-size:12px;font-weight:700;color:var(--blg)">${e.grupo}</span>
        <span style="font-size:10px;color:var(--tx3);font-weight:600">${e.dificultad}</span>
      </div>
      <div style="font-size:13px;font-weight:700;color:var(--sv);margin-bottom:3px">${e.nombre}</div>
      <div style="font-size:11px;color:var(--tx3);font-weight:500">${e.musculos}</div>
      <div style="font-size:10px;color:var(--sv3);margin-top:4px">${e.equipo}</div>
      <button class="btn" style="width:100%;padding:7px;font-size:12px;margin-top:8px">+ Añadir</button>
    </div>`).join('') || '<div style="font-size:13px;color:var(--tx3);padding:20px;text-align:center">Sin resultados</div>';
}

async function rbAddEx(exId, nombre, musculos) {
  const series = parseInt(prompt('Series:', '3') || '3');
  const reps = prompt('Reps:', '10-12') || '10-12';
  const peso = parseFloat(prompt('Peso objetivo (kg):', '0') || '0');
  const descanso = parseInt(prompt('Descanso (segundos):', '90') || '90');
  await api('/dias/' + rutinaState.diaId + '/ejercicios', { method:'POST', body: JSON.stringify({ nombre, musculos, series, reps, peso_objetivo: peso, descanso }) });
  await rbLoadDias();
}

async function rbEditEx(exId, diaId) {
  const p = parseFloat(prompt('Nuevo peso objetivo (kg):') || '0');
  const d = parseInt(prompt('Nuevo descanso (segundos):') || '0');
  const body = {};
  if (p) body.peso_objetivo = p;
  if (d) body.descanso = d;
  await api('/ejercicios/' + exId, { method: 'PUT', body: JSON.stringify(body) });
  await rbLoadDias();
}

async function rbDelEx(exId, diaId) {
  if (!confirm('¿Eliminar este ejercicio?')) return;
  await api('/ejercicios/' + exId, { method: 'DELETE' });
  await rbLoadDias();
}

// ═══ DIETA BUILDER ═══════════════════════════════════
let dietaState = { clienteId: null, comidaId: null };

function hDietaBuilder() {
  return `<div class="sec" style="margin-bottom:14px">
    <div class="sec-hdr">Selecciona cliente</div>
    <select class="inp" id="db_cliente" onchange="dbSelectCliente(this.value)" style="margin-bottom:0">
      <option value="">-- Elige cliente --</option>
    </select>
  </div>
  <div id="db_wrap" style="display:none">
    <div class="sec" style="margin-bottom:14px">
      <div class="sec-hdr">Comidas <button class="sec-act" onclick="dbAddComida()">+ Añadir comida</button></div>
      <div id="db_comidas_list"></div>
    </div>
    <div id="db_alim_panel" style="display:none">
      <div class="sec" style="margin-bottom:14px">
        <div class="sec-hdr">Añadir alimento a: <span id="db_comida_nombre" style="color:var(--blg)"></span></div>
        <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
          <select class="inp" id="db_cat" onchange="dbBuscarAlim()" style="flex:1;min-width:140px">
            <option value="Todos">Todas las categorías</option>
            <option>Proteína</option><option>Carbohidrato</option><option>Verdura</option>
            <option>Grasa saludable</option><option>Lácteo</option>
          </select>
          <input class="inp" id="db_buscar" placeholder="Buscar alimento..." style="flex:2;min-width:160px" oninput="dbBuscarAlim()"/>
        </div>
        <div id="db_alim_lista" style="max-height:340px;overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px"></div>
      </div>
    </div>
  </div>`;
}

async function initDietaBuilder() {
  const cl = await api('/clientes');
  const sel = document.getElementById('db_cliente');
  cl.forEach(c => { const o = document.createElement('option'); o.value = c.id; o.textContent = c.nombre; sel.appendChild(o); });
}

async function dbSelectCliente(id) {
  if (!id) return;
  dietaState.clienteId = id;
  document.getElementById('db_wrap').style.display = 'block';
  await dbLoadComidas();
}

async function dbLoadComidas() {
  const c = await api('/clientes/' + dietaState.clienteId);
  const wrap = document.getElementById('db_comidas_list');
  const mealIcons = ['☀️','🕐','🍽️','🌅','🌙','🥗'];
  wrap.innerHTML = c.comidas.length ? c.comidas.map((m, mi) => `
    <div style="background:var(--s2);border:0.5px solid var(--br);border-radius:14px;margin-bottom:10px;overflow:hidden">
      <div style="padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:${m.items.length?'0.5px solid var(--br)':'none'}">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:22px">${mealIcons[mi]||'🍽️'}</span>
          <div style="font-size:14px;font-weight:700;color:var(--sv)">${m.nombre}</div>
        </div>
        <button class="btn" style="padding:6px 12px;font-size:12px" onclick="dbOpenAlim(${m.id},'${m.nombre}')">+ Alimento</button>
      </div>
      ${m.items.map(it => `
        <div style="display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:0.5px solid rgba(39,39,42,.5)">
          <span style="font-size:20px">${foodEmoji(it.nombre)}</span>
          <div style="flex:1"><div style="font-size:13px;font-weight:600;color:var(--sv2)">${it.nombre}</div></div>
          <div style="text-align:right">
            <input type="number" value="${it.gramos}" min="1" style="width:64px;padding:4px 8px;border:0.5px solid var(--br);border-radius:8px;background:var(--b);color:var(--blg);font-size:13px;font-weight:700;text-align:center" onchange="dbEditGramos(${it.id},this.value)"/>
            <div style="font-size:10px;color:var(--tx3);margin-top:1px">gramos</div>
          </div>
          <button onclick="dbDelAlim(${it.id})" style="background:none;border:none;color:#f87171;cursor:pointer;font-size:16px;padding:2px">✕</button>
        </div>`).join('')}
    </div>`).join('') : '<div style="font-size:13px;color:var(--tx3)">Sin comidas. Añade la primera.</div>';
}

async function dbAddComida() {
  const n = prompt('Nombre (ej: Desayuno, Comida, Cena...):'); if (!n) return;
  await api('/clientes/' + dietaState.clienteId + '/comidas', { method:'POST', body: JSON.stringify({ nombre: n }) });
  await dbLoadComidas();
}

function dbOpenAlim(comidaId, nombre) {
  dietaState.comidaId = comidaId;
  document.getElementById('db_alim_panel').style.display = 'block';
  document.getElementById('db_comida_nombre').textContent = nombre;
  document.getElementById('db_alim_panel').scrollIntoView({ behavior: 'smooth' });
  dbBuscarAlim();
}

async function dbBuscarAlim() {
  const cat = document.getElementById('db_cat').value;
  const buscar = document.getElementById('db_buscar').value;
  const params = new URLSearchParams();
  if (cat !== 'Todos') params.append('categoria', cat);
  if (buscar) params.append('buscar', buscar);
  const alims = await api('/alimentos-db?' + params);
  const lista = document.getElementById('db_alim_lista');
  const catColors = { 'Proteína':'#3b82f6','Carbohidrato':'#a78bfa','Verdura':'#22c55e','Grasa saludable':'#f59e0b','Lácteo':'#ec4899' };
  lista.innerHTML = alims.map(a => `
    <div style="background:var(--s2);border:0.5px solid var(--br);border-radius:12px;padding:12px;cursor:pointer;transition:.15s" onmouseover="this.style.borderColor='var(--bl)'" onmouseout="this.style.borderColor='var(--br)'" onclick="dbAddAlim('${a.nombre.replace(/'/g,"\\'")}')">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-size:20px">${foodEmoji(a.nombre)}</span>
        <span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:${catColors[a.categoria]||'#3b82f6'}22;color:${catColors[a.categoria]||'#3b82f6'}">${a.categoria}</span>
      </div>
      <div style="font-size:13px;font-weight:700;color:var(--sv);margin-bottom:5px">${a.nombre}</div>
      <div style="font-size:11px;color:var(--tx3);font-weight:500">Por 100g: ${a.proteinas}g prot · ${a.carbos}g carbs · ${a.grasas}g grasas</div>
      <button class="btn" style="width:100%;padding:7px;font-size:12px;margin-top:8px">+ Añadir</button>
    </div>`).join('') || '<div style="font-size:13px;color:var(--tx3);padding:20px;text-align:center">Sin resultados</div>';
}

async function dbAddAlim(nombre) {
  const g = parseInt(prompt('Gramos (en crudo):', '100') || '100');
  if (!g) return;
  await api('/comidas/' + dietaState.comidaId + '/alimentos', { method:'POST', body: JSON.stringify({ nombre, gramos: g }) });
  await dbLoadComidas();
}

async function dbEditGramos(id, gramos) {
  await api('/alimentos/' + id, { method:'PUT', body: JSON.stringify({ gramos: parseInt(gramos) }) });
}

async function dbDelAlim(id) {
  await api('/alimentos/' + id, { method:'DELETE' });
  await dbLoadComidas();
}

</script>
</body>
</html>
